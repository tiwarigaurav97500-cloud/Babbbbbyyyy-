<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ♡</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Floating Hearts -->
  <div class="hearts"></div>

  <!-- Intro Message -->
  <div class="intro-message">
    <p>Hello… this is for you ♡  
    <br>Whenever your heart feels heavy… come here.</p>
  </div>

  <h1 class="title">For You, My Special Person ♡</h1>
  <p class="subtitle">Whenever you feel something… listen to the voice meant for you.</p>

  <div class="recording">
    <h2>When You Miss Me</h2>
    <audio controls>
      <source src="miss_you.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="recording">
    <h2>When You Feel Sad</h2>
    <audio controls>
      <source src="sad.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="recording">
    <h2>When You Are Overthinking</h2>
    <audio controls>
      <source src="overthinking.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="recording">
    <h2>When You Have Self-Doubt</h2>
    <audio controls>
      <source src="self_doubt.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="recording">
    <h2>When You Want To Cry</h2>
    <audio controls>
      <source src="crying.mp3" type="audio/mpeg">
    </audio>
  </div>

</body>
</html>nhi
